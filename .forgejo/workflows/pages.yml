name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.forgejo/workflows/pages.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to pages branch
        run: |
          # Configure git
          git config user.name "Forgejo Actions"
          git config user.email "actions@forgejo.local"

          # Copy site content to a temp dir
          cp -r site /tmp/site-deploy

          # Create orphan pages branch
          git checkout --orphan pages

          # Remove all tracked files
          git rm -rf .

          # Copy site content to root
          cp -r /tmp/site-deploy/* .

          # Stage and commit
          git add -A
          git commit -m "Deploy site from ${GITHUB_SHA::8}"

          # Force push to pages branch
          git push origin pages --force
